[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    traditional: Traditional ETL testing (row counts, nulls, duplicates, etc.)
    data_quality: Modern data quality checks (schema, freshness, profiling, etc.)
    integration: End-to-end integration tests
    slow: Tests that take longer to run
    source: Tests for source/landing zone validation
    bronze: Tests for Bronze layer
    silver: Tests for Silver layer
    gold: Tests for Gold layer
    incremental: Tests for incremental/append loads
    scd2_scenario: SCD Type 2 scenario tests
    business_scenario: Business scenario tests (account closure, loan default, etc.)
    negative: Negative testing (bad data, invalid formats)
    dim_customer: Tests specific to dim_customer
    dim_account: Tests specific to dim_account
    dim_branch: Tests specific to dim_branch
    dim_product: Tests specific to dim_product
    fact_transaction: Tests specific to fact_transaction
    fact_loan: Tests specific to fact_loan
addopts = -v --tb=short
